const selectEl = document.getElementById('starSelect');
const accordionEl = document.getElementById('accordion');
const starbarEl = document.getElementById('starbar');
const starNameEl = document.getElementById('starName');
const rootStyle = document.documentElement.style;

selectEl.innerHTML = STARS.map((s,i)=>'<option value="'+i+'">'+s.name+'</option>').join('');

function renderBlock(b){
  if(b.type==='ul'){
    return '<ul>'+b.items.map(function(it){
      if(typeof it==='object'){
        return '<li>'+it.text+'<ul>'+it.sub.map(function(s){return '<li>'+s+'</li>';}).join('')+'</ul></li>';
      }
      return '<li>'+it+'</li>';
    }).join('')+'</ul>';
  }
  if(b.type==='colorul'){
    return '<div class="swatches">'+b.items.map(function(name){
      var hex = COLOR_HEX[name] || '#cccccc';
      return '<span class="swatch"><i style="background:'+hex+'"></i>'+name+'</span>';
    }).join('')+'</div>';
  }
  if(b.type==='p'){
    return '<p>'+b.text+'</p>';
  }
  if(b.type==='h'){
    return '<div class="subhead">'+b.text+'</div>';
  }
  return '';
}

function renderStar(idx){
  var star = STARS[idx];
  rootStyle.setProperty('--accent', star.color);
  rootStyle.setProperty('--deep', star.deep);
  rootStyle.setProperty('--pale', star.pale);
  starNameEl.textContent = star.name;

  accordionEl.innerHTML = star.sections.map(function(sec, i){
    var body = sec.blocks.map(renderBlock).join('');
    return '<div class="cat" data-idx="'+i+'">'+
      '<button type="button" class="cat-head"><span class="label">'+sec.title+'</span><span class="arrow"></span></button>'+
      '<div class="cat-body">'+body+'</div>'+
    '</div>';
  }).join('');

  Array.prototype.forEach.call(accordionEl.querySelectorAll('.cat-head'), function(btn){
    btn.addEventListener('click', function(){
      btn.closest('.cat').classList.toggle('open');
    });
  });
}

selectEl.addEventListener('change', function(){
  renderStar(parseInt(selectEl.value, 10));
});

document.getElementById('openAll').addEventListener('click', function(){
  Array.prototype.forEach.call(accordionEl.querySelectorAll('.cat'), function(c){ c.classList.add('open'); });
});
document.getElementById('closeAll').addEventListener('click', function(){
  Array.prototype.forEach.call(accordionEl.querySelectorAll('.cat'), function(c){ c.classList.remove('open'); });
});

renderStar(0);
</script>
